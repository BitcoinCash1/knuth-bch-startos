name: Build Binary Image

on:
  push:
    branches: [master]
    paths: ['Dockerfile.binary']
  workflow_dispatch:

permissions:
  packages: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push knuth binary image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.binary
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/bitcoincash1/knuth-bch:latest
            ghcr.io/bitcoincash1/knuth-bch:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/BitcoinCash1/knuth-bch-startos
