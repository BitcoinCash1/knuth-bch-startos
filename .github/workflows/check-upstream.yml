name: Check Upstream

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new upstream Knuth release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(gh release view --repo k-nuth/kth --json tagName -q '.tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then echo "Could not fetch upstream version"; exit 0; fi

          CURRENT=$(grep -E '^ARG KNUTH_VERSION=' Dockerfile.binary | cut -d= -f2)
          if [ "$LATEST" = "$CURRENT" ]; then echo "Already at $LATEST — no update"; exit 0; fi

          echo "Updating $CURRENT -> $LATEST"
          bash scripts/auto-bump.sh "$LATEST"
        shell: bash
